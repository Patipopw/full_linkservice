services:
  backend:
    build: ./backend
    container_name: backend_linkservice
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    
    volumes:
      - ./backend:/app 
    
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: postgres_db_linkservice
    restart: always
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432" # ใช้ 5435 เพื่อเลี่ยงพอร์ตทับซ้อนบน Local
  frontend:
    build:
      context: ./frontend  # ระบุ Path ไปยังโฟลเดอร์ Next.js
      dockerfile: Dockerfile
    container_name: frontend_linkservice
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000  # สำหรับเรียก API จาก Browser
      - BACKEND_URL=http://backend:8000           # สำหรับ Server-side Rendering (SSR)
    depends_on:
      - backend
    command: npm run dev
volumes:
  postgres_data:
